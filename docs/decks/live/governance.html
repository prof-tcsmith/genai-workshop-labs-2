<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concept deck</title>
<style>
  :root{--bg:#0b1020;--panel:#141d36;--panel2:#1b2748;--ink:#eaf0ff;--muted:#9fb0d6;--faint:#6b7aa3;
        --line:rgba(255,255,255,.16);--accent:#6ea8fe;--accent2:#5eead4;--violet:#a78bfa;--warn:#fbbf24;--ok:#34d399;--danger:#fb7185;}
  *{box-sizing:border-box} html,body,#root{height:100%;margin:0}
  body{background:
      radial-gradient(900px 500px at 85% -10%,rgba(110,168,254,.16),transparent 60%),
      radial-gradient(700px 460px at -10% 110%,rgba(94,234,212,.12),transparent 55%),var(--bg);
    color:var(--ink);font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  .deck{height:100%;display:flex;flex-direction:column;padding:14px 18px 8px}
  .kick{color:var(--accent2);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:11px}
  .stage{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:9px;overflow:auto}
  h2{font-size:clamp(19px,3.2vw,28px);margin:0;line-height:1.12;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:clamp(13px,1.8vw,16px);margin:0}
  ul{margin:2px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
  li{position:relative;padding-left:21px;font-size:clamp(12.5px,1.6vw,15px);line-height:1.4}
  li::before{content:"";position:absolute;left:2px;top:.52em;width:8px;height:8px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 9px rgba(110,168,254,.7)}
  b{color:#fff}
  .note{border-left:3px solid var(--accent2);background:rgba(94,234,212,.10);border-radius:0 8px 8px 0;
    padding:8px 12px;font-size:clamp(12px,1.55vw,14.5px)}
  .warn{border-left:3px solid var(--warn);background:rgba(251,191,36,.10);border-radius:0 8px 8px 0;
    padding:8px 12px;font-size:clamp(12px,1.55vw,14.5px)}
  .nextpill{display:inline-block;align-self:flex-start;background:rgba(167,139,250,.16);border:1px solid rgba(167,139,250,.5);
    color:var(--violet);font-weight:600;border-radius:999px;padding:4px 12px;font-size:clamp(11.5px,1.4vw,14px)}
  .anim{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .foot{display:flex;align-items:center;gap:12px;padding-top:6px}
  .dots{display:flex;gap:6px;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:background .2s}
  .dot.on{background:var(--accent2)}
  .nav{display:flex;gap:6px}
  button.nav-b{cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
    border-radius:8px;width:30px;height:30px;font-size:15px}
  button.nav-b:hover{border-color:var(--accent)} button.nav-b:disabled{opacity:.35;cursor:default}
  .num{color:var(--faint);font-size:12px;font-variant-numeric:tabular-nums}
  .arch{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:8px}
  .arch svg{width:100%;height:auto;max-height:300px;display:block}
  .archcap{color:var(--faint);font-size:12px;margin-top:4px}
  /* widget helpers (used by interactive viz) */
  .viz{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:11px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex-wrap:wrap}
  .seg button{background:transparent;color:var(--muted);border:0;padding:6px 11px;cursor:pointer;font-size:13px}
  .seg button.on{background:rgba(94,234,212,.16);color:var(--accent2)}
  .bar{height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:5px}
  .bar>i{display:block;height:100%;border-radius:999px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .meterlbl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid var(--line)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  small.muted{color:var(--faint);font-size:12px}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React, { useState, useEffect } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(React.createElement);

/* ============================ ENGINE (do NOT edit) ============================ */
const C = { ink:'#eaf0ff', muted:'#9fb0d6', faint:'#7283a8', line:'rgba(255,255,255,.22)',
  panel:'#1b2748', accent:'#6ea8fe', accent2:'#5eead4', violet:'#a78bfa', ok:'#34d399', warn:'#fbbf24', danger:'#fb7185' };
// SVG helpers for architecture diagrams — use these so all decks look consistent.
function Box({x,y,w,h,lines=[],fill=C.panel,stroke=C.line,accent,fs=13,color=C.ink,rx=10}){
  const a = Array.isArray(lines)?lines:[lines];
  return html`<g>
    <rect x=${x} y=${y} width=${w} height=${h} rx=${rx} fill=${fill} stroke=${accent||stroke} stroke-width=${accent?2.4:1.2}/>
    ${a.map((ln,i)=>html`<text key=${i} x=${x+w/2} y=${y+h/2-(a.length-1)*0.62*fs+i*1.22*fs+0.34*fs}
      text-anchor="middle" font-size=${fs} font-weight="700" fill=${color}>${ln}</text>`)}
  </g>`;
}
function HArrow({x1,x2,y,color=C.faint,label}){
  const d = x2>x1?1:-1;
  return html`<g>
    <g stroke=${color} fill=${color}><line x1=${x1} y1=${y} x2=${x2-d*9} y2=${y} stroke-width="2.2"/>
      <polygon points=${`${x2},${y} ${x2-d*10},${y-5.5} ${x2-d*10},${y+5.5}`} stroke="none"/></g>
    ${label?html`<text x=${(x1+x2)/2} y=${y-7} text-anchor="middle" font-size="11" fill=${C.muted}>${label}</text>`:''}
  </g>`;
}
function VArrow({y1,y2,x,color=C.faint}){
  const d = y2>y1?1:-1;
  return html`<g stroke=${color} fill=${color}><line x1=${x} y1=${y1} x2=${x} y2=${y2-d*9} stroke-width="2.2"/>
    <polygon points=${`${x},${y2} ${x-5.5},${y2-d*10} ${x+5.5},${y2-d*10}`} stroke="none"/></g>`;
}
function Deck({ topic: T }) {
  const [i, setI] = useState(0);
  const n = T.slides.length;
  const go = d => setI(x => Math.max(0, Math.min(n-1, x+d)));
  useEffect(() => {
    const k = e => { if(e.key==='ArrowRight'||e.key===' ') go(1); if(e.key==='ArrowLeft') go(-1); };
    window.addEventListener('keydown', k); return () => window.removeEventListener('keydown', k);
  });
  const s = T.slides[i], Comp = s.comp;
  return html`<div class="deck">
    <div class="kick">${T.kicker}${s.tag?html` · ${s.tag}`:''}</div>
    <div class="stage anim" key=${i}>
      <h2>${s.h}</h2>
      ${s.sub?html`<p class="sub">${s.sub}</p>`:''}
      ${s.bullets?html`<ul>${s.bullets.map((b,k)=>html`<li key=${k} dangerouslySetInnerHTML=${{__html:b}}></li>`)}</ul>`:''}
      ${Comp?html`<${Comp}/>`:''}
      ${s.note?html`<div class="note" dangerouslySetInnerHTML=${{__html:s.note}}></div>`:''}
      ${s.warn?html`<div class="warn">⚠️ <b>Shortcoming:</b> <span dangerouslySetInnerHTML=${{__html:s.warn}}></span></div>`:''}
      ${s.next?html`<div class="nextpill">▶ Next: ${s.next}</div>`:''}
    </div>
    <div class="foot">
      <div class="dots">${T.slides.map((_,k)=>html`<span key=${k} class=${'dot'+(k===i?' on':'')} onClick=${()=>setI(k)}></span>`)}</div>
      <span class="num">${i+1} / ${n}</span>
      <div class="nav">
        <button class="nav-b" onClick=${()=>go(-1)} disabled=${i===0}>‹</button>
        <button class="nav-b" onClick=${()=>go(1)} disabled=${i===n-1}>›</button>
      </div>
    </div>
  </div>`;
}
/* ========================== END ENGINE ========================== */

/* ====================== CONTENT START (author this region) ====================== */
/* Level 5 — A2A + governance. Three specialist agents (Orchestrator / Research /
   Action) collaborate on a refund under governance: A2A messages, RBAC enforced
   in code, a human approval gate, and an append-only audit log. */

// Architecture: the Orchestrator delegates to a read-only Research agent and
// proposes a write to the Action agent — but a human approval gate sits before
// the write, RBAC guards the write tool, and an audit log records everything.
// local helper: a straight arrow at ANY angle (connects boxes at different heights).
function DArrow({x1,y1,x2,y2,color=C.faint,label,lx,ly}){
  const a=Math.atan2(y2-y1,x2-x1),ux=Math.cos(a),uy=Math.sin(a),L=11,W=6,bx=x2-L*ux,by=y2-L*uy,px=-uy,py=ux;
  return html`<g stroke=${color} fill=${color}>
    <line x1=${x1} y1=${y1} x2=${bx} y2=${by} stroke-width="2.2"/>
    <polygon stroke="none" points=${`${x2},${y2} ${bx+W*px},${by+W*py} ${bx-W*px},${by-W*py}`}/>
    ${label?html`<text x=${lx??(x1+x2)/2} y=${ly??(y1+y2)/2-6} text-anchor="middle" font-size="11" fill=${C.muted} stroke="none">${label}</text>`:''}
  </g>`;
}

function Arch() {
  return html`<div class="arch">
    <svg viewBox="0 0 720 250" role="img">
      ${/* Orchestrator coordinates; delegates to Research, proposes to Action */''}
      ${Box({x:24,y:96,w:150,h:58,lines:["Orchestrator","coordinates · decides"],accent:C.accent,fs:12})}
      ${Box({x:270,y:34,w:200,h:54,lines:["Research · READ-ONLY","get_order · search_policy"],accent:C.accent2,fs:11})}
      ${Box({x:270,y:160,w:150,h:54,lines:["Human approval","gate"],fill:"rgba(167,139,250,.12)",accent:C.violet,fs:12})}
      ${DArrow({x1:174,y1:108,x2:268,y2:58,label:"A2A: get facts",lx:228,ly:72})}
      ${DArrow({x1:268,y1:84,x2:174,y2:128,color:C.faint,label:"findings",lx:222,ly:122})}
      ${DArrow({x1:174,y1:145,x2:268,y2:180,label:"A2A: propose",lx:226,ly:150})}

      ${/* approval gate → Action (write), guarded by RBAC */''}
      ${HArrow({x1:420,x2:478,y:187,label:"approved"})}
      ${Box({x:480,y:160,w:216,h:54,lines:["Action · WRITE","issue_refund"],accent:C.ok,fs:11})}
      <text x="556" y="150" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.04em" fill=${C.warn}>🔒 RBAC: action role only</text>

      ${/* every step recorded in the append-only audit log */''}
      ${Box({x:480,y:34,w:216,h:50,lines:["Audit log · append-only"],fill:"rgba(251,191,36,.10)",accent:C.warn,fs:12})}
      ${VArrow({y1:160,y2:88,x:648,color:C.faint})}
    </svg>
    <div class="archcap">A2A between agents; Research is read-only; RBAC + a human gate guard the write; the audit log records every step.</div>
  </div>`;
}

// Interactive: pick a role + a tool, see whether RBAC allows the call.
// Research+issue_refund → BLOCKED. Action+issue_refund → allowed (pending approval).
function RbacCheck() {
  // RBAC policy, mirroring the demo's RBAC dict (enforced in code, not a prompt).
  const PERMS = {
    "Research": ["get_order","search_policy"],   // READ-ONLY
    "Action":   ["issue_refund"],                  // WRITE — action role only
  };
  const [role,setRole]=useState("Research");
  const [tool,setTool]=useState("search_policy");
  const allowed = PERMS[role].includes(tool);
  const isWrite = tool==="issue_refund";
  let verdict, color, note;
  if (!allowed) {
    verdict="🚫 BLOCKED by RBAC"; color="var(--danger)";
    note=`role '${role}' may not call '${tool}' — stopped before the function runs.`;
  } else if (isWrite) {
    verdict="✅ allowed"; color="var(--ok)";
    note="…then routed to the human approval gate — nothing executes yet.";
  } else {
    verdict="✅ allowed"; color="var(--ok)";
    note="read-only tool — no side effects, no approval needed.";
  }
  return html`<div class="viz">
    <small class="muted">Role</small>
    <div class="seg">${Object.keys(PERMS).map(k=>html`<button key=${k} class=${role===k?'on':''} onClick=${()=>setRole(k)}>${k}</button>`)}</div>
    <small class="muted" style=${{display:'block',marginTop:8}}>Tool</small>
    <div class="seg">${["search_policy","issue_refund"].map(k=>html`<button key=${k} class=${tool===k?'on':''} onClick=${()=>setTool(k)}>${k}</button>`)}</div>
    <div style=${{marginTop:10}}><span class="pill" style=${{color,borderColor:color}}>${verdict}</span></div>
    <div style=${{marginTop:8}}><small class="muted">${note}</small></div>
  </div>`;
}

const TOPIC = {
  kicker: "Level 5 · A2A + governance · Layers 2 & 7",
  slides: [
    { h: "Agents that collaborate — safely",
      sub: "A refund, handled by three specialist agents under governance.",
      tag: "scenario" },
    { h: "What it does", tag: "the cool part", bullets: [
      "<b>Orchestrator + Research + Action</b> collaborate to handle a refund (A2A).",
      "<b>RBAC</b> stops the read-only agent from ever writing.",
      "A <b>human approves</b> before any money moves.",
      "<b>Every step is logged</b> for an auditor." ] },
    { h: "Architecture", tag: "how it works", comp: Arch },
    { h: "The governance controls", tag: "Layer 7", bullets: [
      "<b>A2A messages</b> — specialist agents coordinate, each a separate LLM call.",
      "<b>RBAC</b> — least-privilege tool access enforced in code (read role can't write).",
      "<b>Approval gate</b> — human-in-the-loop before any irreversible action.",
      "<b>Audit log</b> — the append-only trail you hand an auditor." ] },
    { h: "RBAC check", tag: "try it",
      sub: "Pick a role and a tool — see whether the dispatch layer allows the call.",
      comp: RbacCheck },
    { h: "Try it in the demo", tag: "your turn", bullets: [
      "Run the workflow for order <b>4471</b>; read the <b>A2A timeline</b>.",
      "Expand <b>Prove RBAC</b> — watch a read-side write get blocked.",
      "<b>Approve / deny</b> at the gate; then read the <b>audit log</b>.",
      "Try <b>5012</b> (expired) to see a denial." ] },
    { h: "Governance is never \"done\"", tag: "shortcoming",
      warn: "Governance is never 'done' — model and data drift, new attack patterns, and ongoing evaluation/monitoring mean the controls need continuous attention.",
      next: "The end-to-end case studies & the full 7-layer architecture (the main workshop deck)" },
    { h: "Why it matters", tag: "takeaway",
      note: "Orchestration lets specialist agents collaborate (<b>Layer 2</b>), but trust comes from governance (<b>Layer 7</b>) — least-privilege RBAC, a human before irreversible actions, and a complete audit trail. This is <b>IS governance, applied to agents</b>." },
  ],
};
/* ====================== CONTENT END ====================== */

createRoot(document.getElementById('root')).render(html`<${Deck} topic=${TOPIC}/>`);
</script>
</body>
</html>
